name: Critical Quality Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  quality:
    name: Beach Buddy critical checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run critical quality gate
        run: npm run quality:critical
